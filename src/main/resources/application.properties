spring.application.name=demo
spring.config.import=optional:file:./local.properties,optional:file:./demo/local.properties
openai.model=gpt-5-mini
openai.api-key=${OPENAI_API_KEY:}
server.port=8081

jwt.secret=${JWT_SECRET:local-development-secret-change-before-production-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# OAuth is optional for local development. Add these properties to local.properties
# only after real provider credentials are available; empty client IDs stop startup.
# spring.security.oauth2.client.registration.google.client-id=
# spring.security.oauth2.client.registration.google.client-secret=
# spring.security.oauth2.client.registration.google.scope=openid,email,profile
# spring.security.oauth2.client.registration.github.client-id=
# spring.security.oauth2.client.registration.github.client-secret=
# spring.security.oauth2.client.registration.github.scope=user:email,read:user

judge0.base-url=${JUDGE0_BASE_URL:}
judge0.api-key=${JUDGE0_API_KEY:}
judge0.host=${JUDGE0_HOST:judge0-ce.p.rapidapi.com}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:aicodeassistant}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
