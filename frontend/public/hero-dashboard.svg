  <text x="378" y="282" fill="#93C5FD" font-family="Consolas, monospace" font-size="18">public class Analyzer {</text>
  <text x="378" y="320" fill="#E5E7EB" font-family="Consolas, monospace" font-size="18">  public static void main(String[] args) {</text>
  <text x="378" y="358" fill="#E5E7EB" font-family="Consolas, monospace" font-size="18">    int left = 0;</text>
  <text x="378" y="396" fill="#E5E7EB" font-family="Consolas, monospace" font-size="18">    int right = nums.length - 1;</text>
  <text x="378" y="434" fill="#FCA5A5" font-family="Consolas, monospace" font-size="18">    while (left &lt; right) {</text>
  <text x="378" y="472" fill="#E5E7EB" font-family="Consolas, monospace" font-size="18">      int mid = (left + right) / 2;</text>
  <text x="378" y="510" fill="#A7F3D0" font-family="Consolas, monospace" font-size="18">      if (nums[mid] == target) return mid;</text>
